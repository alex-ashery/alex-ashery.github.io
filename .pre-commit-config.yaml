repos:
  - repo: local
    hooks:
      - id: nix-flake-check
        name: nix flake check
        entry: nix flake check
        language: system
        pass_filenames: false
      - id: tofu-fmt
        name: tofu fmt
        entry: bash -lc 'tofu -chdir=infra/cloudflare fmt -recursive && tofu -chdir=infra/github fmt -recursive'
        language: system
        files: ^infra/.*\.(tf|tfvars|hcl)$
        pass_filenames: false
