{{ define "title" }}
  {{ .Title }} - {{ .Site.Title }}
{{ end }}

{{ define "content" }}
  <section class="container page">
    <article>
      <header>
        <h1 class="title">{{ .Title }}</h1>
      </header>
      {{ with .Content }}
        <div class="post-content">
          {{ . }}
        </div>
      {{ end }}

      <div id="resume-status" style="display:none;"></div>
      <div id="resume-root" style="display:none;" data-endpoint="{{ .Site.Params.jsonResumeUrl | default "" }}"></div>
      <pre id="resume-raw" style="display:none; white-space: pre-wrap;"></pre>
    </article>
  </section>
  <script src="/js/resume.bundle.js" defer></script>
{{ end }}
